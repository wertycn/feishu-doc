# CNB 云原生构建配置 — feishu-doc

# ── main 分支推送：测试 → 同步到 GitHub ──────────────────────────────────────
main:
  push:
    - imports:
        - https://cnb.cool/debug.icu/secrets/-/blob/main/common.yaml
      stages:
        - name: test
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            make test

        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/wertycn/feishu-doc.git
            auth_type: https
            username: wertycn
            password: ${GH_TOKEN}
            branch: main
            push_tags: "false"
            force: "true"

# ── Tag 事件：编译 → Release → 上传制品 → 同步到 GitHub ──────────────────────
$:
  tag_push:
    - services:
        - docker
      imports:
        - https://cnb.cool/debug.icu/secrets/-/blob/main/common.yaml
      stages:
        - name: build multi-platform binaries
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            VERSION="${CNB_BRANCH}"
            make test
            make release V="${VERSION}"
            for f in dist/feishu-doc-${VERSION}-*; do
              target=$(echo "$f" | sed "s/${VERSION}-//")
              cp "$f" "$target"
            done
            ls -lh dist/

        - name: extract release notes
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            git fetch --tags --unshallow 2>/dev/null || git fetch --tags
            PREV_TAG=$(git describe --tags --abbrev=0 "${CNB_BRANCH}^" 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${CNB_BRANCH}"
            else
              RANGE="${CNB_BRANCH}"
            fi
            TAG_MSG=$(git log --pretty=format:'- %s' "$RANGE" | perl -ne 'print unless $seen{$_}++')
            if [ -z "$TAG_MSG" ]; then
              TAG_MSG="Release ${CNB_BRANCH}"
            fi
            echo "$TAG_MSG" > release_notes.md

        - name: create release
          type: git:release
          options:
            title: ${CNB_BRANCH}
            descriptionFromFile: release_notes.md
            latest: true

        - name: upload release attachments
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./dist/*"

        - name: sync tag to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/wertycn/feishu-doc.git
            auth_type: https
            username: wertycn
            password: ${GH_TOKEN}
            branch: main
            push_tags: "true"
            force: "true"

        - name: create github release
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            VERSION="${CNB_BRANCH}"
            REPO="wertycn/feishu-doc"
            NOTES=$(cat release_notes.md | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' | sed 's/^"//;s/"$//')

            RESP=$(curl -sf \
              -X POST "https://api.github.com/repos/${REPO}/releases" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"${VERSION}\",\"name\":\"${VERSION}\",\"body\":\"${NOTES}\"}")

            RELEASE_ID=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
            echo "Release created: id=$RELEASE_ID"

            for file in dist/feishu-doc-*; do
              name=$(basename "$file")
              echo "  Uploading $name..."
              curl -sf \
                -X POST "https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${name}" \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$file" > /dev/null
            done
            echo "GitHub Release $VERSION 发布完成"
          env:
            GH_TOKEN: ${GH_TOKEN}
